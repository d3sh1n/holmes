name: artifact-tool
description: Proves harness artifacts can become deterministic tool outputs.
mode: pentest
config:
  compressor:
    enabled: false
  learning:
    enabled: false
turns:
  - input: "Inspect the login response artifact."
tools:
  - name: fixture_http
    description: Returns a deterministic HTTP fixture.
    read_only: true
artifacts:
  - path: fixtures/http/login-response.json
    as_tool_output: fixture_http
scripted_responses:
  - content: '<holmes_decision>{"type":"use_tools","rationale":"load deterministic HTTP artifact","calls":[{"id":"call-1","type":"function","function":{"name":"fixture_http","arguments":"{\"path\":\"login\"}"}}]}</holmes_decision>'
  - content: '<holmes_decision>{"type":"answer","message":"Artifact response observed with MFA required."}</holmes_decision>'
expectations:
  final_contains:
    - MFA required
  event_types:
    - user_message
    - tool_call
    - tool_result
    - turn_complete
  event_sequence:
    - user_message
    - thinking
    - tool_call
    - tool_result
    - thinking
    - turn_complete
  tool_calls:
    - fixture_http
  max_errors: 0
