name: deductive-login-enumeration
description: Proves Holmes records an explicit evidence-to-conclusion deduction trace.
mode: pentest
config:
  compressor:
    enabled: false
  learning:
    enabled: false
turns:
  - input: "Determine whether the staging login leaks user enumeration."
tools:
  - name: login_probe
    description: Returns controlled valid/invalid username probe evidence.
    read_only: true
    output: |
      valid_user_status=401
      invalid_user_status=404
      response_diff=true
      signal=user_enumeration
      confirmed=true
scripted_responses:
  - content: '<holmes_decision>{"type":"use_tools","rationale":"compare controlled login responses","calls":[{"id":"call-1","type":"function","function":{"name":"login_probe","arguments":"{\"valid\":\"alice\",\"invalid\":\"not-a-user\"}"}}]}</holmes_decision>'
  - content: '<holmes_decision>{"type":"answer","message":"Deduction trace supports login user enumeration."}</holmes_decision>'
expectations:
  final_contains:
    - user enumeration
  event_sequence:
    - user_message
    - tool_call
    - tool_result
    - evidence_observed
    - fact_recorded
    - hypothesis_proposed
    - prediction_made
    - experiment_planned
    - hypothesis_supported
    - hypothesis_confirmed
    - conclusion_drawn
    - turn_complete
  tool_calls:
    - login_probe
  max_errors: 0
