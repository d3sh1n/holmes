name: basic-tool
description: Minimal deterministic scenario that proves Holmes can call a mock tool and continue.
mode: pentest
turns:
  - input: inspect example.test
tools:
  - name: echo_probe
    description: Returns deterministic probe evidence.
    output: example.test is reachable
    read_only: true
scripted_responses:
  - content: '<holmes_decision>{"type":"use_tools","rationale":"collect deterministic evidence","calls":[{"id":"call-1","type":"function","function":{"name":"echo_probe","arguments":"{\"target\":\"example.test\"}"}}]}</holmes_decision>'
  - content: '<holmes_decision>{"type":"answer","message":"Tool result observed"}</holmes_decision>'
expectations:
  final_contains:
    - Tool result observed
  event_types:
    - user_message
    - tool_call
    - tool_result
    - turn_complete
  tool_calls:
    - echo_probe
  max_errors: 0
