name: interactive-ask-watson
description: Proves harness can model Holmes asking Watson and continuing with an inline reply.
mode: pentest
config:
  compressor:
    enabled: false
  learning:
    enabled: false
turns:
  - input: "Test the login flow."
    expect_needs_user: true
    reply: "Yes, authorized for staging only."
scripted_responses:
  - content: '<holmes_decision>{"type":"ask_watson","question":"Do we have authorization to test staging login?","context":"This confirms scope before touching auth flows.","options":["yes","no"]}</holmes_decision>'
  - content: '<holmes_decision>{"type":"answer","message":"Authorization recorded for staging login."}</holmes_decision>'
expectations:
  final_contains:
    - Authorization recorded
  needs_user_count: 1
  yield_types:
    - needs_user_input
    - final_answer
  event_sequence:
    - user_message
    - advisor_action
    - turn_complete
    - user_message
    - thinking
    - turn_complete
  max_errors: 0
